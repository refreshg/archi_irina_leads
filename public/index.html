<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Archi — ვერ დავუკავშირდი ლიდები</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
  :root { --bg:#0f172a; --card:#1e293b; --line:#334155; --txt:#e2e8f0; --mut:#94a3b8; --acc:#38bdf8; --hot:#f87171; --sale:#34d399; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:"Segoe UI",system-ui,Arial,sans-serif; background:var(--bg); color:var(--txt); }
  header { padding:20px 24px; border-bottom:1px solid var(--line); }
  h1 { margin:0; font-size:20px; }
  .sub { color:var(--mut); font-size:13px; margin-top:4px; }
  .bar { display:flex; flex-wrap:wrap; gap:12px; align-items:flex-end; padding:18px 24px; background:var(--card); border-bottom:1px solid var(--line); }
  .fld { display:flex; flex-direction:column; gap:4px; }
  .fld label { font-size:12px; color:var(--mut); }
  input { background:#0b1220; border:1px solid var(--line); color:var(--txt); padding:8px 10px; border-radius:8px; font-size:14px; }
  button { background:var(--acc); color:#06283d; border:none; padding:9px 16px; border-radius:8px; font-weight:600; cursor:pointer; font-size:14px; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  button.ghost { background:transparent; color:var(--acc); border:1px solid var(--acc); }
  .stats { padding:12px 24px; display:flex; gap:18px; flex-wrap:wrap; font-size:14px; color:var(--mut); }
  .pill { padding:2px 10px; border-radius:999px; font-size:12px; font-weight:700; }
  .pill.Hot { background:rgba(248,113,113,.15); color:var(--hot); }
  .pill.Sale { background:rgba(52,211,153,.15); color:var(--sale); }
  .wrap { padding:0 24px 40px; overflow-x:auto; }
  table { border-collapse:collapse; width:100%; font-size:13px; }
  th,td { border-bottom:1px solid var(--line); padding:8px 10px; text-align:left; vertical-align:top; }
  th { position:sticky; top:0; background:var(--bg); color:var(--mut); font-weight:600; white-space:nowrap; }
  td.cmt { max-width:340px; }
  tbody tr { cursor:pointer; }
  tbody tr:hover { background:#243044; }
  td a { color:var(--acc); text-decoration:none; }
  td a:hover { text-decoration:underline; }
  .muted { color:var(--mut); }
  .spinner { display:inline-block; width:16px; height:16px; border:2px solid var(--mut); border-top-color:var(--acc); border-radius:50%; animation:spin .8s linear infinite; vertical-align:middle; }
  @keyframes spin { to { transform:rotate(360deg); } }
  #msg { padding:14px 24px; color:var(--mut); }
  .err { color:var(--hot); }
  /* PIN gate */
  #gate { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:50; }
  #gate .box { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:28px; width:300px; text-align:center; }
  #gate h2 { margin:0 0 4px; font-size:18px; }
  #gate p { margin:0 0 18px; color:var(--mut); font-size:13px; }
  #pin { width:100%; text-align:center; letter-spacing:8px; font-size:22px; padding:10px; }
  #gate button { width:100%; margin-top:12px; padding:11px; }
  #gateErr { color:var(--hot); font-size:13px; min-height:18px; margin-top:10px; }
  #app { display:none; }
  /* tabs */
  .tabs { display:flex; gap:4px; padding:0 24px; background:var(--card); border-bottom:1px solid var(--line); }
  .tab { padding:13px 20px; cursor:pointer; color:var(--mut); border-bottom:2px solid transparent; font-weight:600; font-size:14px; user-select:none; }
  .tab:hover { color:var(--txt); }
  .tab.active { color:var(--acc); border-bottom-color:var(--acc); }
</style>
</head>
<body>
<div id="gate">
  <div class="box">
    <h2>🔒 Archi ლიდები</h2>
    <p>შეიყვანე PIN კოდი</p>
    <input type="password" id="pin" inputmode="numeric" maxlength="8" autocomplete="off" placeholder="••••">
    <button id="gateBtn">შესვლა</button>
    <div id="gateErr"></div>
  </div>
</div>

<div id="app">
<header>
  <h1 id="title">Archi CRM — „ვერ დავუკავშირდი“ ლიდები</h1>
  <div class="sub" id="sub">დილები, რომლებიც მითითებულ თარიღში გადავიდნენ ეტაპზე „ვერ დავუკავშირდი“ და <b>ახლაც იქ არიან</b> (Sale + Hot). სტრიქონზე დაჭერით — დილი იხსნება CRM-ში.</div>
</header>

<div class="tabs">
  <div class="tab active" data-report="nocontact">ვერ დავუკავშირდი</div>
  <div class="tab" data-report="interested">დაინტერესებული</div>
</div>

<div class="bar">
  <div class="fld"><label>თარიღიდან</label><input type="date" id="from"></div>
  <div class="fld"><label>თარიღამდე</label><input type="date" id="to"></div>
  <button id="load">ჩატვირთვა</button>
  <button id="export" class="ghost" disabled>⬇ Excel-ში ჩამოტვირთვა</button>
</div>

<div class="stats" id="stats"></div>
<div id="msg"></div>
<div class="wrap"><table id="tbl"><thead></thead><tbody></tbody></table></div>
</div><!-- /#app -->

<script>
const CRM_BASE = 'https://crm.archi.ge';
const dealUrl = id => `${CRM_BASE}/crm/deal/details/${id}/`;

const COLS = [
  ['type','ტიპი'],
  ['client','კლიენტი'],
  ['phone','ტელეფონი'],
  ['fbName','FB Name (კამპანია)'],
  ['pipeline','პაიფლაინი'],
  ['created','შექმნის თარიღი'],
  ['movedTime','ვერ დავუკავშირდი-ზე გადასვლა'],
  ['currentStage','ამჟამინდელი ეტაპი'],
  ['lastComment','ბოლო კომენტარი'],
  ['commentDate','კომენტარის თარიღი'],
  ['dealId','Deal ID'],
];

function pad(n){ return String(n).padStart(2,'0'); }
function ymd(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function fmt(iso){ if(!iso) return ''; const d=new Date(iso); if(isNaN(d)) return iso; return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes()); }
function esc(s){ return String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

// default = yesterday
(function(){
  const y = new Date(Date.now()-86400000);
  document.getElementById('from').value = ymd(y);
  document.getElementById('to').value   = ymd(y);
})();

let currentRows = [];
let PIN = sessionStorage.getItem('archi_pin') || '';
let REPORT = 'nocontact';
const REPORT_META = {
  nocontact: {
    label:'ვერ დავუკავშირდი', file:'ver_davukavshirdi',
    sub:'დილები, რომლებიც მითითებულ თარიღში გადავიდნენ ეტაპზე „ვერ დავუკავშირდი“ და <b>ახლაც იქ არიან</b> (Sale + Hot).'
  },
  interested: {
    label:'დაინტერესებული', file:'dainteresebuli',
    sub:'დილები, რომლებიც მითითებულ თარიღში <b>მოხვდნენ</b> ეტაპზე „დაინტერესებული“ — <b>მიუხედავად იმისა, ახლა რომელ ეტაპზე არიან</b> (თუნდაც JUNK). მიმდინარე ეტაპი ცხრილშია.'
  },
};

// ---- PIN gate ----
async function tryPin(){
  const pin = document.getElementById('pin').value.trim();
  const errEl = document.getElementById('gateErr');
  if(!pin){ errEl.textContent = 'შეიყვანე PIN'; return; }
  errEl.textContent = 'მოწმდება…';
  try{
    const u = new URL('/api/leads', location.origin);
    u.searchParams.set('check','1'); u.searchParams.set('key', pin);
    const r = await fetch(u);
    if(r.ok){
      PIN = pin; sessionStorage.setItem('archi_pin', pin);
      document.getElementById('gate').style.display = 'none';
      document.getElementById('app').style.display = 'block';
    } else {
      const d = await r.json().catch(()=>({}));
      errEl.textContent = d.error || 'არასწორი PIN კოდი';
    }
  }catch(e){ errEl.textContent = 'შეცდომა: '+(e.message||e); }
}

const MAX_DAYS = 100;

// run `worker` over items with bounded concurrency
async function pool(items, limit, worker){
  let i = 0;
  await Promise.all(Array.from({ length: Math.min(limit, items.length) }, async () => {
    while(i < items.length){ const idx = i++; await worker(items[idx]); }
  }));
}

function daysBetween(a, b){
  const out = [], d = new Date(a+'T00:00:00'), e = new Date(b+'T00:00:00');
  if(isNaN(d) || isNaN(e) || d > e) return out;
  for(let x = new Date(d); x <= e; x.setDate(x.getDate()+1)) out.push(ymd(x));
  return out;
}

// fetch ONE day; returns {rows} or {error} or {unauthorized:true}
async function fetchDay(day){
  const u = new URL('/api/leads', location.origin);
  u.searchParams.set('from', day+'T00:00:00');
  u.searchParams.set('to',   day+'T23:59:59');
  u.searchParams.set('report', REPORT);
  if(PIN) u.searchParams.set('key', PIN);

  const r = await fetch(u);
  const raw = await r.text();
  let data = null;
  try { data = JSON.parse(raw); } catch(_) { /* non-JSON error page */ }

  if(r.status === 401) return { unauthorized:true };
  if(!data){
    let m = `HTTP ${r.status}`;
    if(r.status === 504 || r.status === 502 || /timed? ?out/i.test(raw)) m += ' (timeout)';
    return { error:`${day}: ${m}` };
  }
  if(!r.ok || data.error) return { error:`${day}: ${data.error || ('HTTP '+r.status)}` };
  return { rows: data.rows || [] };
}

async function load(){
  const from = document.getElementById('from').value;
  const to   = document.getElementById('to').value;
  if(!from || !to){ msg('აირჩიე თარიღები','err'); return; }

  const days = daysBetween(from, to);
  if(days.length === 0){ msg('„თარიღიდან“ უნდა იყოს „თარიღამდე“-ზე ადრე','err'); return; }
  if(days.length > MAX_DAYS){ msg(`დიაპაზონი ძალიან დიდია (${days.length} დღე). მაქსიმუმი ${MAX_DAYS} დღე.`,'err'); return; }

  clearResults(); // don't leave stale stats/rows next to an error
  const btn = document.getElementById('load');
  btn.disabled = true; document.getElementById('export').disabled = true;
  const t0 = Date.now();

  // the range is split per-day so each request stays small (no serverless timeout)
  const byId = new Map();   // dealId -> row (keep the latest movedTime)
  const errors = [];
  let done = 0, unauthorized = false;

  const progress = () => msg(`<span class="spinner"></span> იტვირთება… დღე <b>${done}/${days.length}</b> · ნაპოვნია <b>${byId.size}</b> ლიდი · ${Math.round((Date.now()-t0)/1000)}წმ`);
  progress();

  try{
    await pool(days, 3, async (day) => {
      if(unauthorized) return;
      try{
        const res = await fetchDay(day);
        if(res.unauthorized){ unauthorized = true; return; }
        if(res.error){ errors.push(res.error); }
        else for(const row of res.rows){
          const prev = byId.get(row.dealId);
          if(!prev || new Date(row.movedTime) > new Date(prev.movedTime)) byId.set(row.dealId, row);
        }
      }catch(e){ errors.push(`${day}: ${e.message||e}`); }
      done++; progress();
    });

    if(unauthorized){
      sessionStorage.removeItem('archi_pin'); PIN='';
      document.getElementById('app').style.display='none';
      document.getElementById('gate').style.display='flex';
      document.getElementById('gateErr').textContent = 'PIN ვადაგასულია — შეიყვანე ხელახლა';
      return;
    }

    currentRows = [...byId.values()].sort((a,b)=>(+a.dealId)-(+b.dealId));
    const sale = currentRows.filter(r=>r.type==='Sale').length;
    const hot  = currentRows.filter(r=>r.type==='Hot').length;

    if(currentRows.length === 0 && errors.length){
      msg('შეცდომა: '+esc(errors[0]), 'err');
      return;
    }
    render({ count: currentRows.length, sale, hot });
    const secs = Math.round((Date.now()-t0)/1000);
    let m = `✅ ჩაიტვირთა ${currentRows.length} ლიდი ${secs}წმ-ში — ${esc(from)} → ${esc(to)} (${days.length} დღე)`;
    if(errors.length) m += ` <span class="err">· ${errors.length} დღე ვერ ჩაიტვირთა: ${esc(errors[0])}</span>`;
    msg(m);
    document.getElementById('export').disabled = currentRows.length===0;
  }catch(e){
    msg('შეცდომა: '+esc(e.message||e), 'err');
  }finally{
    btn.disabled = false;
  }
}

function render(data){
  const thead = document.querySelector('#tbl thead');
  const tbody = document.querySelector('#tbl tbody');
  thead.innerHTML = '<tr>'+COLS.map(c=>`<th>${esc(c[1])}</th>`).join('')+'</tr>';
  tbody.innerHTML = currentRows.map(row => `<tr data-id="${esc(row.dealId)}" title="დააჭირე — დილი გაიხსნება CRM-ში">`+COLS.map(([k])=>{
    let v = row[k];
    if(k==='created'||k==='movedTime'||k==='commentDate') v = fmt(v);
    if(k==='type') return `<td><span class="pill ${esc(v)}">${esc(v)}</span></td>`;
    if(k==='lastComment') return `<td class="cmt">${esc(v)}</td>`;
    if(k==='dealId') return `<td><a href="${esc(dealUrl(v))}" target="_blank" rel="noopener">${esc(v)} ↗</a></td>`;
    return `<td>${esc(v)}</td>`;
  }).join('')+'</tr>').join('');

  document.getElementById('stats').innerHTML =
    `<div>სულ: <b style="color:var(--txt)">${data.count}</b></div>`+
    `<div><span class="pill Sale">Sale</span> ${data.sale}</div>`+
    `<div><span class="pill Hot">Hot</span> ${data.hot}</div>`;
}

function exportXlsx(){
  if(!currentRows.length) return;
  const aoa = [ COLS.map(c=>c[1]) ];
  currentRows.forEach(row => aoa.push(COLS.map(([k])=>{
    let v = row[k];
    if(k==='created'||k==='movedTime'||k==='commentDate') v = fmt(v);
    return v==null ? '' : v;
  })));
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols'] = COLS.map((c,i)=>({wch: i===8?40:18}));
  const wb = XLSX.utils.book_new();
  const meta = REPORT_META[REPORT];
  XLSX.utils.book_append_sheet(wb, ws, meta.label);
  const from = document.getElementById('from').value;
  XLSX.writeFile(wb, `archi_${meta.file}_${from}.xlsx`);
}

function msg(html, cls){ const m=document.getElementById('msg'); m.className = cls||''; m.innerHTML = html; }

// ---- tabs ----
function clearResults(){
  currentRows = [];
  document.querySelector('#tbl thead').innerHTML = '';
  document.querySelector('#tbl tbody').innerHTML = '';
  document.getElementById('stats').innerHTML = '';
  document.getElementById('export').disabled = true;
  msg('');
}
function applyReport(){
  const meta = REPORT_META[REPORT];
  document.getElementById('title').textContent = `Archi CRM — „${meta.label}“ ლიდები`;
  document.getElementById('sub').innerHTML = meta.sub + ' სტრიქონზე დაჭერით — დილი იხსნება CRM-ში.';
}
document.querySelectorAll('.tab').forEach(tab => tab.addEventListener('click', () => {
  if(tab.classList.contains('active')) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  REPORT = tab.dataset.report;
  applyReport();
  clearResults();
  load();
}));

document.getElementById('load').addEventListener('click', load);
document.getElementById('export').addEventListener('click', exportXlsx);
document.getElementById('gateBtn').addEventListener('click', tryPin);
document.getElementById('pin').addEventListener('keydown', e => { if(e.key==='Enter') tryPin(); });

// if a valid PIN is already stored this session, skip the gate
(async function initGate(){
  if(!PIN){ document.getElementById('pin').focus(); return; }
  try{
    const u = new URL('/api/leads', location.origin);
    u.searchParams.set('check','1'); u.searchParams.set('key', PIN);
    const r = await fetch(u);
    if(r.ok){ document.getElementById('gate').style.display='none'; document.getElementById('app').style.display='block'; }
    else { sessionStorage.removeItem('archi_pin'); PIN=''; document.getElementById('pin').focus(); }
  }catch(e){ document.getElementById('pin').focus(); }
})();

// click a row -> open the deal in CRM (ignore clicks on the inner link)
document.querySelector('#tbl tbody').addEventListener('click', (e) => {
  if(e.target.closest('a')) return;
  const tr = e.target.closest('tr[data-id]');
  if(tr) window.open(dealUrl(tr.dataset.id), '_blank', 'noopener');
});
</script>
</body>
</html>
